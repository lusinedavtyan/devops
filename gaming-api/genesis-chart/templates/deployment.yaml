apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: genesis
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: genesis
    spec:
      containers:
        - name: genesis
          image: nginx:1.26
          ports:
            - containerPort: 80

          envFrom:
            - configMapRef:
                name: genesis-config

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: genesis-db-creds
                  key: DB_PASSWORD

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: genesis-db-creds
                  key: DB_USER

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
