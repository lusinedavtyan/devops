apiVersion: v1
kind: Service
metadata:
  name: genesis-service
spec:
  type: NodePort
  selector:
    app: genesis
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP

    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
