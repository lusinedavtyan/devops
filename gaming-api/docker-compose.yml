version: "3.8"

services:
  backend:
    build: .
    container_name: genesis-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: docker.io/library/postgres:15
    container_name: genesis-db
    environment:
      POSTGRES_DB: genesis_db
      POSTGRES_USER: genesis_user
      POSTGRES_PASSWORD: genesis_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
