apiVersion: apps/v1
kind: Deployment
metadata:
  name: genesis-deployment
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      containers:
        - name: genesis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}

          envFrom:
            - configMapRef:
                name: genesis-config

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: genesis-db-creds
                  key: DB_PASSWORD

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: genesis-db-creds
                  key: DB_USER

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
